<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>404 — ページが見つかりません | SIMPLE</title>
<style>
  :root {
    --jp: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
    --en: "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--jp);
    color: #111;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap { text-align: center; max-width: 520px; }
  .num {
    font-family: var(--en);
    font-weight: 300;
    font-size: 120px;
    letter-spacing: 0.04em;
    line-height: 1;
    margin: 0 0 24px;
    color: #111;
  }
  .eyebrow {
    font-family: var(--en);
    font-size: 11px;
    letter-spacing: 0.4em;
    color: #888;
    margin-bottom: 16px;
  }
  h1 {
    font-family: var(--jp);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.08em;
    margin: 0 0 24px;
  }
  p {
    font-size: 14px;
    line-height: 2;
    color: #555;
    margin: 0 0 40px;
    letter-spacing: 0.05em;
  }
  a {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: var(--en);
    font-size: 12px;
    letter-spacing: 0.3em;
    color: #111;
    text-decoration: none;
    padding-bottom: 6px;
    border-bottom: 1px solid #111;
    transition: gap 0.3s ease;
  }
  a:hover { gap: 20px; }

  @media (max-width: 480px) {
    .num { font-size: 72px; }
    h1 { font-size: 18px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">404 — NOT FOUND</div>
    <p class="num">404</p>
    <h1>お探しのページは見つかりませんでした。</h1>
    <p>
      URL に誤りがあるか、ページが移動・削除された可能性があります。<br/>
      お手数ですが、トップページからお探しください。
    </p>
    <a href="/">BACK TO HOME <span>→</span></a>
  </div>
</body>
</html>
